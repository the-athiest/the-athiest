name: Generate Language Race
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: JuanBlanco/github-lang-race@v1
        with:
          github_user_name: the-athiest
          outputs: dist/lang-race.gif
